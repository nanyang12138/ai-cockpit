name: idea-to-mvp
description: >
  Default exploration workflow used by AI Cockpit. As of v0.2 step 4 this
  YAML actually drives the run: the CLI consults `mode`, `max_loops`, and
  `defaults.<node>.*` here when the user does not pass an explicit flag.
  The node order MUST stay in sync with src/ai_cockpit/graph.py — the
  loader will refuse to start otherwise.
mode: exploration
max_loops: 1
nodes:
  - intake
  - planner
  - coder
  - verifier
  - reviewer
  - decision
  - summary
defaults:
  verifier:
    test_commands: []
edges:
  - from: intake
    to: planner
  - from: planner
    to: coder
  - from: coder
    to: verifier
  - from: verifier
    to: reviewer
  - from: reviewer
    to: decision
  - from: decision
    to: coder
    when: retry
  - from: decision
    to: summary
    when: done
  - from: decision
    to: summary
    when: ask_human
