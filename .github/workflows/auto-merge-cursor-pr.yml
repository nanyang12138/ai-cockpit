name: cursor-pr-automation

# Two responsibilities, one file:
#   1. open-pr   — when cron pushes a `cursor/**` branch, open a PR for it
#                  if none exists, so the user no longer has to click "Create
#                  pull request" in the UI.
#   2. auto-merge — when validate finishes successfully on either a
#                   `pull_request` event (humans / fork-style flow) or a
#                   `push` to a `cursor/**` branch (cron flow), turn on
#                   auto-merge for the matching PR.
#
# Why two triggers in one workflow: the cron-mode Cloud Agent token cannot
# create PRs, and PRs created by GITHUB_TOKEN do NOT trigger `pull_request`
# workflows. So we run validate from the push event, open the PR ourselves,
# and key auto-merge off the push-side workflow_run as well.

on:
  push:
    branches: ['cursor/**']
  workflow_run:
    workflows: ["validate"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for commit message)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open PR if none exists for this cursor/** branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          existing=$(gh pr list --repo "$REPO" --state open --head "$BRANCH" \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Open PR #$existing already tracks $BRANCH; nothing to do."
            exit 0
          fi

          title="$(git log -1 --pretty=%s)"
          body="$(git log -1 --pretty=%b)"
          if [ -z "$body" ]; then
            body="Automated PR for branch \`$BRANCH\`."
          fi

          gh pr create \
            --repo "$REPO" \
            --base master \
            --head "$BRANCH" \
            --title "$title" \
            --body "$body"

  auto-merge:
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      (
        github.event.workflow_run.event == 'pull_request' ||
        (
          github.event.workflow_run.event == 'push' &&
          startsWith(github.event.workflow_run.head_branch, 'cursor/')
        )
      )
    runs-on: ubuntu-latest

    steps:
      - name: Resolve pull request from workflow_run
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")

          if [ -z "$PR_NUMBER" ]; then
            HEAD_BRANCH=$(jq -r '.workflow_run.head_branch' "$GITHUB_EVENT_PATH")
            HEAD_OWNER=$(jq -r '.workflow_run.head_repository.owner.login // .repository.owner.login' "$GITHUB_EVENT_PATH")
            echo "workflow_run payload had no PR number; falling back to head lookup: ${HEAD_OWNER}:${HEAD_BRANCH}"

            PR_NUMBER=$(gh api "repos/${REPO}/pulls" \
              -f state=open \
              -f head="${HEAD_OWNER}:${HEAD_BRANCH}" \
              --jq '.[0].number // empty')
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "Could not resolve PR for workflow_run."
            echo "workflow_run event:"
            jq '.workflow_run | {id, event, conclusion, head_branch, head_sha, pull_requests}' "$GITHUB_EVENT_PATH"
            exit 1
          fi

          PR_JSON=$(gh pr view "$PR_NUMBER" \
            --repo "$REPO" \
            --json number,isDraft,author,url,headRefName,mergeStateStatus)

          echo "$PR_JSON"

          AUTHOR=$(echo "$PR_JSON" | jq -r '.author.login')
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName')

          case "$AUTHOR" in
            cursor[bot] | app/cursor | nanyang12138 | github-actions[bot])
              ;;
            *)
              echo "Refusing to auto-merge PR authored by ${AUTHOR}"
              exit 1
              ;;
          esac

          case "$HEAD_REF" in
            cursor/*) ;;
            *)
              echo "Refusing to auto-merge non-Cursor branch: ${HEAD_REF}"
              exit 1
              ;;
          esac

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "is_draft=$(echo "$PR_JSON" | jq -r '.isDraft')" >> "$GITHUB_OUTPUT"
          echo "url=$(echo "$PR_JSON" | jq -r '.url')" >> "$GITHUB_OUTPUT"

      - name: Mark draft PR ready
        if: steps.pr.outputs.is_draft == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr ready "$PR_NUMBER" --repo "$REPO"

      - name: Enable squash auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --auto \
            --squash
